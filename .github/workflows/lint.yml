name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check --select E9,F63,F7,F82 --output-format=github ."
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github tests/test_cli_entrypoints.py tests/test_mailbox_provider.py tests/test_scheduler.py"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check tests/test_cli_entrypoints.py tests/test_mailbox_provider.py tests/test_scheduler.py"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest
